<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Dart Rechner</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { margin: 0; padding: 0; height: 100%; background: #000; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior: none; }
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  header { background: #1a1a1a; padding: 16px 20px; display: flex; align-items: center;
    justify-content: space-between; padding-top: max(16px, env(safe-area-inset-top)); }
  header h1 { font-size: 22px; font-weight: 600; margin: 0; flex: 1; text-align: center; }
  header .icon-btn { background: none; border: none; color: #4ade80; font-size: 24px;
    cursor: pointer; padding: 4px 8px; min-width: 40px; }
  header .left { min-width: 40px; }

  main { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }

  nav.bottom { background: #1a1a1a; display: flex; justify-content: space-around;
    padding: 8px 0; padding-bottom: max(8px, env(safe-area-inset-bottom));
    border-top: 1px solid #2a2a2a; }
  nav.bottom button { background: none; border: none; color: #888; padding: 4px 8px;
    font-size: 11px; cursor: pointer; display: flex; flex-direction: column;
    align-items: center; gap: 4px; flex: 1; }
  nav.bottom button.active { color: #4ade80; }
  nav.bottom button svg { width: 22px; height: 22px; }

  /* Buttons */
  .btn { padding: 12px 16px; border: none; border-radius: 6px; font-size: 16px;
    cursor: pointer; font-weight: 600; }
  .btn-green { background: #4ade80; color: #000; }
  .btn-red { background: #ef4444; color: #fff; }
  .btn-gray { background: #444; color: #fff; }
  .btn-outline-green { background: transparent; border: 1px solid #4ade80; color: #4ade80; }

  /* Home */
  .toggle-row { display: flex; border: 1px solid #4ade80; border-radius: 8px;
    overflow: hidden; max-width: 280px; margin: 0 auto 20px; }
  .toggle-row button { flex: 1; padding: 10px; background: transparent;
    border: none; color: #4ade80; font-size: 16px; cursor: pointer; }
  .toggle-row button.active { background: #4ade80; color: #000; }

  .config-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
    max-width: 480px; margin: 0 auto 20px; }
  .config-cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .config-cell .label { color: #888; font-size: 13px; }
  .config-cell .value { padding: 14px 8px; border-radius: 6px; width: 100%;
    text-align: center; font-weight: 700; font-size: 17px; cursor: pointer;
    border: none; color: #fff; }
  .config-cell .value.green { background: #16a34a; }
  .config-cell .value.red { background: #dc2626; }

  .start-btn { display: block; margin: 20px auto; width: 80%; max-width: 320px;
    padding: 18px; font-size: 20px; background: #dc2626; color: #fff;
    border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
  .start-btn:disabled { opacity: 0.4; }

  .action-row { display: flex; gap: 10px; align-items: center; margin: 16px 0; flex-wrap: wrap; }
  .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer;
    color: #fff; font-size: 15px; }
  .checkbox-label input { display: none; }
  .checkbox-label .box { width: 22px; height: 22px; border: 2px solid #4ade80;
    border-radius: 4px; display: flex; align-items: center; justify-content: center; }
  .checkbox-label input:checked + .box::after { content: "✓"; color: #4ade80;
    font-weight: bold; font-size: 16px; }
  .action-btn { background: #16a34a; color: #fff; border: none; padding: 12px 16px;
    border-radius: 6px; cursor: pointer; font-size: 15px; display: flex;
    align-items: center; gap: 6px; flex: 1; justify-content: center;
    min-height: 48px; max-height: 48px; }
  .action-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
  .checkout-bar { display: flex; gap: 6px; justify-content: center; padding: 10px 8px 4px;
    background: #1a1a1a; }
  .checkout-bar .co-dart { background: #000; color: #fff; padding: 8px 16px;
    border-radius: 4px; font-weight: 700; font-size: 17px; min-width: 60px;
    text-align: center; }
  .checkout-bar .co-empty { color: #555; padding: 10px 0; font-size: 14px; }

  /* Players list */
  .player-row { display: flex; align-items: center; padding: 12px 8px;
    border-bottom: 1px solid #1a1a1a; gap: 8px; }
  .player-row .dart-icon { width: 28px; height: 28px; flex-shrink: 0; display:inline-block; }
  .player-row .dart-icon svg { width: 100%; height: 100%; }
  .player-row .name { flex: 1; font-size: 17px; font-weight: 600;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .player-row .name.active { color: #4ade80; }
  .player-row .name.bot { color: #4ade80; }
  .player-row .icon-action { background: #333; border: none; color: #fff;
    cursor: pointer; padding: 8px; border-radius: 6px; flex-shrink: 0;
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
  .player-row .icon-action svg { width: 20px; height: 20px; }
  .player-row .icon-action.edit { background: #16a34a; }
  .player-row .icon-action.del { background: #dc2626; }
  .player-row .drag { color: #777; padding: 6px; cursor: grab; flex-shrink: 0;
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
  .player-row .drag svg { width: 22px; height: 22px; }
  .player-row.dragging { opacity: 0.4; }

  /* Game history */
  .game-card { background: #2a2a2a; border-radius: 8px; padding: 14px;
    margin-bottom: 12px; }
  .game-card .head { display: flex; justify-content: space-between;
    align-items: flex-start; margin-bottom: 4px; }
  .game-card .date { font-size: 18px; font-weight: 700; }
  .game-card .status { color: #4ade80; font-weight: 700; font-size: 15px; }
  .game-card .gtype { color: #999; font-size: 14px; margin-bottom: 12px; }
  .game-card .pline { display: flex; justify-content: space-between;
    padding: 10px 0; border-top: 1px solid #1a1a1a; }
  .game-card .pline .pname { font-size: 16px; }
  .game-card .pline .pname .num { color: #777; margin-right: 6px; }
  .game-card .pline .pstats { text-align: right; color: #888; font-size: 13px; }
  .game-card .pline .pscore { font-size: 18px; font-weight: 700; color: #fff; }
  .game-card .pline.winner .pscore { color: #4ade80; }

  /* Game view */
  .game-info { color: #999; font-size: 15px; margin: 8px 0 16px; }
  .player-panel { background: #2a2a2a; border-radius: 6px; margin-bottom: 8px;
    padding: 14px; position: relative; overflow: hidden; display: grid;
    grid-template-columns: auto 1fr auto; gap: 12px; align-items: center; }
  .player-panel.active::before { content: ""; position: absolute; left: 0; top: 0;
    bottom: 0; width: 6px; background: #4ade80; }
  .player-panel .score { font-size: 42px; font-weight: 700; }
  .player-panel .pname-block { display: flex; flex-direction: column; gap: 4px; }
  .player-panel .pname-block .nm { color: #888; font-size: 15px; }
  .player-panel .darts { display: flex; gap: 6px; }
  .player-panel .dart-box { width: 44px; height: 44px; background: #000;
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; transition: background 0.2s; }
  .player-panel .dart-box.bust { background: #dc2626; color: #fff !important; }
  .player-panel .stats { text-align: right; font-size: 13px; color: #888; }
  .player-panel .stats b { color: #fff; }
  .player-panel .turn-total { font-size: 18px; font-weight: 700; color: #fff;
    text-align: center; }

  .keypad { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
    padding: 8px; background: #1a1a1a; }
  .keypad button { background: #555; border: none; color: #fff; padding: 16px 0;
    font-size: 18px; font-weight: 600; border-radius: 4px; cursor: pointer; }
  .keypad button:active { background: #777; }
  .keypad button.double { background: #f59e0b; grid-column: span 2; }
  .keypad button.double.active { background: #d97706; outline: 2px solid #fff; }
  .keypad button.triple { background: #ea580c; grid-column: span 2; }
  .keypad button.triple.active { background: #c2410c; outline: 2px solid #fff; }
  .keypad button.undo { background: #ef4444; }
  .keypad button.disabled { opacity: 0.3; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal { background: #1a1a1a; border-radius: 12px; padding: 24px; max-width: 360px;
    width: 100%; }
  .modal h2 { margin: 0 0 16px; font-size: 20px; }
  .modal input { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444;
    border-radius: 6px; color: #fff; font-size: 16px; margin-bottom: 16px; }
  .modal .actions { display: flex; gap: 10px; justify-content: flex-end; }

  .stats-card { background: #2a2a2a; padding: 16px; border-radius: 8px; margin-bottom: 12px; }
  .stats-card h3 { margin: 0 0 12px; color: #4ade80; }
  .stats-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 15px; }
  .stats-row .lbl { color: #999; }
  .empty { text-align: center; color: #666; padding: 40px 20px; }

  .settings-row { background: #2a2a2a; padding: 16px; border-radius: 8px; margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center; }
  .settings-row .lbl { font-size: 16px; }
  .settings-row .val { color: #4ade80; font-size: 15px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ============================================================================
//  STATE & PERSISTENCE
// ============================================================================
const STORAGE_KEY = 'dartrechner_v1';
const defaultState = {
  players: [],
  games: [],
  activePlayerId: null,
  config: {
    mode: 'X01',
    punkte: 201,
    checkout: 'Straight Out',
    checkin: 'Straight In',
    saetze: 1,
    legs: 1,
    matchType: 'First to',
    randomOrder: true,
    selectedPlayerIds: [],
  },
  view: 'home',
  game: null,
  botCounter: 0,
};

let state = load();
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return JSON.parse(JSON.stringify(defaultState));
    const parsed = JSON.parse(raw);
    return { ...JSON.parse(JSON.stringify(defaultState)), ...parsed,
             config: { ...defaultState.config, ...(parsed.config||{}) } };
  } catch { return JSON.parse(JSON.stringify(defaultState)); }
}
function save() {
  const persist = {
    players: state.players,
    games: state.games,
    activePlayerId: state.activePlayerId,
    config: state.config,
    botCounter: state.botCounter,
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(persist));
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmtDate(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2,'0');
  return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ============================================================================
//  ICONS
// ============================================================================

  settings: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94 0 .31.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>',
  dart: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 2l-9 9-1.5-1.5L20.5 0.5 22 2zM2 22l7-2 4-4-5-5-4 4-2 7z"/></svg>',

  plus: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>',

  volume_off: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.17v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>',

  pencil: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34a.9959.9959 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>',
};

// ============================================================================
//  ROUTER / RENDER
// ============================================================================
function render() {
  const app = document.getElementById('app');
  let content;
  if (state.game) content = renderGame();
  else if (state.view === 'home') content = renderHome();
  else if (state.view === 'players') content = renderPlayers();
  else if (state.view === 'stats') content = renderStats();
  else if (state.view === 'allgames') content = renderAllGames();
  else if (state.view === 'settings') content = renderSettings();

  app.innerHTML = content;
  attachHandlers();
  // Scroll active player into view during game
  const activePanel = document.querySelector('[data-active-panel]');
  if (activePanel) activePanel.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function renderBottomNav(active) {
  if (state.game) return '';
  const tabs = [
    ['home','Start',ICONS.home],
    ['players','Spieler',ICONS.players],
    ['stats','Statistiken',ICONS.stats],
    ['allgames','Alle Spiele',ICONS.history],
    ['settings','Einstellungen',ICONS.settings],
  ];
  return `<nav class="bottom">${tabs.map(([id,lbl,ic])=>
    `<button data-nav="${id}" class="${active===id?'active':''}">${ic}<span>${lbl}</span></button>`
  ).join('')}</nav>`;
}

// ============================================================================
//  HOME / START
// ============================================================================
function renderHome() {
  const c = state.config;
  const selected = c.selectedPlayerIds.map(id => state.players.find(p=>p.id===id)).filter(Boolean);
  const canStart = selected.length >= 1;

  return `
    <header>
      <div class="left"></div>
      <h1>Dart Rechner</h1>
      <button class="icon-btn">${ICONS.share}</button>
    </header>
    <main>
      <div class="config-grid">
        <div class="config-cell">
          <span class="label">Punkte</span>
          <button class="value green" data-cfg="punkte">${c.punkte}</button>
        </div>
        <div class="config-cell">
          <span class="label">Check-Out</span>
          <button class="value red" data-cfg="checkout">${c.checkout}</button>
        </div>
        <div class="config-cell">
          <span class="label">Sätzen</span>
          <button class="value green" data-cfg="saetze">${c.saetze}</button>
        </div>
        <div class="config-cell">
          <span class="label">Satz/Leg</span>
          <button class="value green" data-cfg="matchType">${c.matchType}</button>
        </div>
        <div class="config-cell">
          <span class="label">Check-In</span>
          <button class="value red" data-cfg="checkin">${c.checkin}</button>
        </div>
        <div class="config-cell">
          <span class="label">Legs</span>
          <button class="value green" data-cfg="legs">${c.legs}</button>
        </div>
      </div>

      <button class="start-btn" id="startBtn" ${!canStart?'disabled':''}>START</button>

      <div class="action-row">
        <label class="checkbox-label">
          <input type="checkbox" id="randomOrder" ${c.randomOrder?'checked':''}>
          <span class="box"></span>
          <span>Zufällige Reihenfolge</span>
        </label>
        <button class="action-btn" id="addBot">${ICONS.bot}<span style="font-size:18px">+</span></button>
        <button class="action-btn" id="addPlayerHome">${ICONS.plus} Hinzufügen</button>
      </div>

      <div style="color:#888;margin-top:16px;">Spieler</div>
      <div id="selectedPlayers">
        ${selected.length===0 ? '<div class="empty">Keine Spieler ausgewählt</div>' :
          selected.map((p,i)=>`
            <div class="player-row" data-pid="${p.id}" draggable="true">

function computeStats() {
  const totalGames = state.games.length;
  const x01Games = state.games.filter(g=>g.mode==='X01').length;
  const cricketGames = state.games.filter(g=>g.mode==='Cricket').length;
  const perPlayer = state.players.map(p => {
    let games=0, wins=0, totalScore=0, scoreCount=0, highest=0;
    state.games.forEach(g => {
      const pl = g.players.find(x=>x.id===p.id);
      if (!pl) return;
      games++;
      if (g.winner === p.id) wins++;
      if (g.mode==='X01' && pl.turns) {
        pl.turns.forEach(t => {
          if (t > 0) { totalScore += t; scoreCount++; }
          if (t > highest) highest = t;
        });
      }
    });
    return { name: p.name, games, wins,
             avg: scoreCount?totalScore/scoreCount:0, highest };
  }).filter(s=>s.games>0);
  return { totalGames, x01Games, cricketGames, perPlayer };
}

function dartOptions() {
  const opts = [];
  for (let i = 1; i <= 20; i++) opts.push({label: String(i), value: i});
  opts.push({label: '25', value: 25});
  for (let i = 1; i <= 20; i++) opts.push({label: 'D'+i, value: i*2});
  opts.push({label: 'Bull', value: 50});
  for (let i = 1; i <= 20; i++) opts.push({label: 'T'+i, value: i*3});
  return opts;
}

function isDoubleLabel(lbl) {
  return lbl === 'Bull' || (lbl.startsWith('D') && lbl !== '25');
}

function findCheckout(score, dartsLeft, requireDoubleEnd) {
  if (score <= 0 || dartsLeft < 1) return null;
  const opts = dartOptions();
  // 1 dart
  for (const o of opts) {
    if (o.value === score && (!requireDoubleEnd || isDoubleLabel(o.label))) return [o.label];
  }
  if (dartsLeft < 2) return null;
  // 2 darts (high first)
  const desc = [...opts].sort((a,b) => b.value - a.value);
  for (const a of desc) {
    if (a.value >= score) continue;
    const need = score - a.value;
    for (const b of opts) {
      if (b.value === need && (!requireDoubleEnd || isDoubleLabel(b.label))) {
        return [a.label, b.label];
      }
    }
  }
  if (dartsLeft < 3) return null;
  // 3 darts
  for (const a of desc) {
    if (a.value >= score) continue;
    const r1 = score - a.value;
    for (const b of desc) {
      if (b.value >= r1) continue;
      const need = r1 - b.value;
      for (const c of opts) {
        if (c.value === need && (!requireDoubleEnd || isDoubleLabel(c.label))) {
          return [a.label, b.label, c.label];
        }
      }
    }
  }
  return null;
}

function checkoutSuggestion(score, dartsLeft, mode) {
  if (score <= 0 || score > 180 || dartsLeft < 1) return [];
  // Prefer the well-known checkout chart for Double Out
  if (mode === 'Double Out' || mode === 'Master Out') {
    if (score === 1) return [];
    const chart = CHECKOUTS_DO[score];
    if (chart && chart.length <= dartsLeft) return chart;
    const found = findCheckout(score, dartsLeft, true);
    return found || [];
  }
  // Straight Out: any combination
  const chart = CHECKOUTS_DO[score];
  if (chart && chart.length <= dartsLeft) return chart;
  const found = findCheckout(score, dartsLeft, false);
  return found || [];
}

// ============================================================================
//  GAME LOGIC
// ============================================================================
function startGame() {
  const c = state.config;
  let plIds = [...c.selectedPlayerIds];
  if (c.randomOrder) plIds = shuffle(plIds);
  const players = plIds.map(id => {
    const base = state.players.find(p=>p.id===id) || {name:'?', id};
    return {
      id: base.id, name: base.name, isBot: base.isBot,
      score: c.punkte, sets: 0, legs: 0,
      dartCount: 0, totalScored: 0, avg: 0, lastTurn: 0,
      turns: [],
    };
  });
  state.game = {
    config: { ...c },
    players,
    currentPlayerIdx: 0,
    currentDarts: [null, null, null],
    multiplier: 1,
    muted: false,
    startedAt: Date.now(),
    legsToWin: c.legs,
    setsToWin: c.saetze,
    finished: false,
  };
  state.view = 'game';
  save(); render();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1;i>0;i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function pressNum(n) {
  const g = state.game;
  if (!g || g.finished) return;
  const idx = g.currentDarts.findIndex(d=>d===null);
  if (idx === -1) return;
  const mult = (n===25 && g.multiplier===3) ? 2 : g.multiplier; // bull triple = bull (no triple bull)
  const value = n * (n===0 ? 0 : mult);
  let label;
  if (n===0) label = '0';
  else if (mult===1) label = String(n);
  else if (mult===2) label = (n===25 ? 'DB' : 'D'+n);
  else label = 'T'+n;
  g.currentDarts[idx] = { value, label, n, mult };
  g.multiplier = 1;

  // Auto-submit after 3 darts OR if player would bust / win
  const cur = g.players[g.currentPlayerIdx];
  const turnSum = sumDarts(g.currentDarts);
  const newScore = cur.score - turnSum;
  const dartsThrown = g.currentDarts.filter(Boolean).length;

  const lastDart = g.currentDarts[idx];
  const lastIsDouble = lastDart.mult === 2 || (lastDart.n === 25 && lastDart.mult === 2);

  // Check for instant win on this dart
  if (newScore === 0) {
    if (g.config.checkout === 'Straight Out' || lastIsDouble) {
      finishTurn(true, false);
      return;
    } else {
      g.bustFlash = true;
      save(); render();
      setTimeout(() => { g.bustFlash = false; finishTurn(false, true); }, 1300);
      return;
    }
  }
  // Bust conditions
  if (newScore < 0 || (g.config.checkout === 'Double Out' && newScore === 1)) {
    g.bustFlash = true;
    save(); render();
    setTimeout(() => { g.bustFlash = false; finishTurn(false, true); }, 1300);
    return;
  }
  if (dartsThrown === 3) {
    finishTurn(false, false);
  }
  save(); render();
}

function finishTurn(won, bust) {
  const g = state.game;
  // Save snapshot for undo across turns
  if (!g.history) g.history = [];
  g.history.push(JSON.stringify({
    players: g.players, currentPlayerIdx: g.currentPlayerIdx,
    currentDarts: g.currentDarts, multiplier: g.multiplier,
  }));
  if (g.history.length > 50) g.history.shift();

  const cur = g.players[g.currentPlayerIdx];
  const turnSum = bust ? 0 : sumDarts(g.currentDarts);
  const dartsThrown = g.currentDarts.filter(Boolean).length;

  cur.dartCount += dartsThrown;
  cur.lastDarts = g.currentDarts.map(d => d ? d.label : '');
  cur.lastDartsBust = !!bust;
  if (!bust) {
    cur.score -= turnSum;
    cur.totalScored += turnSum;
    cur.turns.push(turnSum);
    cur.lastTurn = turnSum;
  } else {
    cur.turns.push(0);
    cur.lastTurn = 0;
  }
  cur.avg = cur.dartCount ? (cur.totalScored / cur.dartCount * 3) : 0;

  if (won) {
    cur.legs += 1;
    const legsToWinLeg = g.config.legs;
    if (cur.legs >= legsToWinLeg) {
      cur.sets += 1;
      g.players.forEach(p => p.legs = 0);
      if (cur.sets >= g.config.saetze) {
        // game over
        finishGame(cur.id);
        return;
      }
    }
    // reset for next leg
    g.players.forEach(p => p.score = g.config.punkte);
    g.currentPlayerIdx = (g.currentPlayerIdx + 1) % g.players.length;
  } else {
    g.currentPlayerIdx = (g.currentPlayerIdx + 1) % g.players.length;
  }
  g.currentDarts = [null, null, null];
  g.multiplier = 1;
  save(); render();
}

function finishGame(winnerId) {
  const g = state.game;
  g.finished = true;
  const record = {
    id: uid(),
    date: g.startedAt,
    mode: 'X01',
    config: g.config,
    players: g.players.map(p => ({
      id: p.id, name: p.name, sets: p.sets, legs: p.legs,
      finalScore: p.totalScored, turns: p.turns,
    })),
    winner: winnerId,
  };
  state.games.push(record);
  state.game = null;
  state.view = 'allgames';
  save(); render();
  setTimeout(()=>alert('Spiel beendet! Gewinner: ' + g.players.find(p=>p.id===winnerId).name), 50);
}

function undoDart() {
  const g = state.game;
  if (!g) return;
  // 1. Undo within current turn if any dart thrown
  for (let i=2;i>=0;i--) {
    if (g.currentDarts[i]) { g.currentDarts[i] = null; g.multiplier = 1; save(); render(); return; }
  }
  // 2. No current darts → restore previous turn from history
  //    Restore the snapshot (with all darts intact) AND remove only the last dart
  //    so the user can correct just that one throw.
  if (g.history && g.history.length > 0) {
    const snap = JSON.parse(g.history.pop());
    g.players = snap.players;
    g.currentPlayerIdx = snap.currentPlayerIdx;
    g.currentDarts = snap.currentDarts || [null,null,null];
    g.multiplier = 1;
    // Remove only the last thrown dart
    for (let i=2;i>=0;i--) {
      if (g.currentDarts[i]) { g.currentDarts[i] = null; break; }
    }
    save(); render();
  }
}

// ============================================================================
//  HANDLERS
// ============================================================================
function attachHandlers() {
  // Bottom nav
  document.querySelectorAll('[data-nav]').forEach(b => {
    b.onclick = () => { state.view = b.dataset.nav; render(); };
  });

  // Mode toggle
  document.querySelectorAll('[data-mode]').forEach(b => {
    b.onclick = () => { state.config.mode = b.dataset.mode; save(); render(); };
  });

  // Config buttons
  document.querySelectorAll('[data-cfg]').forEach(b => {
    b.onclick = () => cycleConfig(b.dataset.cfg);
  });

  // Random order
  const ro = document.getElementById('randomOrder');
  if (ro) ro.onchange = () => { state.config.randomOrder = ro.checked; save(); };

  // Start button
  const sb = document.getElementById('startBtn');
  if (sb) sb.onclick = startGame;

  // Add bot
  const ab = document.getElementById('addBot');
  if (ab) ab.onclick = addBot;

  // Add player from home
  const aph = document.getElementById('addPlayerHome');
  if (aph) aph.onclick = () => promptAddPlayer(true);

  // Players page add
  const apb = document.getElementById('addPlayerBtn');
  if (apb) apb.onclick = () => promptAddPlayer(false);

  // Remove from selected (home)
  document.querySelectorAll('[data-removeSel]').forEach(b => {
    b.onclick = () => {
      state.config.selectedPlayerIds = state.config.selectedPlayerIds.filter(id => id !== b.dataset.removesel);
      save(); render();
    };
  });

  // Rename player
  document.querySelectorAll('[data-renamePlayer]').forEach(b => {
    b.onclick = (e) => {
      e.stopPropagation();
      const id = b.dataset.renameplayer;
      const p = state.players.find(x => x.id === id);
      if (!p) return;
      const newName = prompt('Neuer Name:', p.name);
      if (newName && newName.trim()) {
        p.name = newName.trim();
        // Update name in past games too
        state.games.forEach(g => {
          const gp = g.players.find(x => x.id === id);
          if (gp) gp.name = p.name;
        });
        save(); render();
      }
    };
  });

  // Remove player permanently
  document.querySelectorAll('[data-removePlayer]').forEach(b => {
    b.onclick = () => {
      if (!confirm('Spieler löschen?')) return;
      const id = b.dataset.removeplayer;
      state.players = state.players.filter(p => p.id !== id);
      state.config.selectedPlayerIds = state.config.selectedPlayerIds.filter(x=>x!==id);
      if (state.activePlayerId === id) state.activePlayerId = null;
      save(); render();
    };
  });

  // Set active player
  document.querySelectorAll('[data-setactive]').forEach(b => {
    b.onclick = () => {
      const id = b.dataset.setactive;
      state.activePlayerId = state.activePlayerId === id ? null : id;
      save(); render();
    };
  });

  // Games filter
  document.querySelectorAll('[data-filter]').forEach(b => {
    b.onclick = () => { state.gamesFilter = b.dataset.filter; render(); };
  });

  // Clear games
  const cg = document.getElementById('clearGames');
  if (cg) cg.onclick = () => {
    if (confirm('Alle Spiele löschen?')) { state.games = []; save(); render(); }
  };

  // Game keypad
  document.querySelectorAll('[data-num]').forEach(b => {
    b.onclick = () => pressNum(parseInt(b.dataset.num));
  });
  document.querySelectorAll('[data-mult]').forEach(b => {
    b.onclick = () => {
      const m = parseInt(b.dataset.mult);
      state.game.multiplier = state.game.multiplier === m ? 1 : m;
      save(); render();
    };
  });
  const ud = document.getElementById('undoDart');
  if (ud) ud.onclick = undoDart;

  // Back from game
  const bg = document.getElementById('backGame');
  if (bg) bg.onclick = () => {
    if (confirm('Spiel abbrechen? Fortschritt geht verloren.')) {
      state.game = null; state.view = 'home'; save(); render();
    }
  };

  // Settings
  const ex = document.getElementById('exportData');
  if (ex) ex.onclick = exportData;
  const im = document.getElementById('importData');
  if (im) im.onclick = importData;
  const rs = document.getElementById('resetAll');
  if (rs) rs.onclick = () => {
    if (confirm('Wirklich ALLE Daten löschen?')) {
      localStorage.removeItem(STORAGE_KEY);
      state = load(); render();
    }
  };

  // Click on selected players in home to nothing; on players page click name to add to selection
  document.querySelectorAll('.player-row').forEach(row => {
    const pid = row.dataset.pid;
    if (!pid) return;
    if (state.view === 'players') {
      // Click the name area to toggle selection for next game
      const name = row.querySelector('.name');
      if (name) {
        name.onclick = () => {
          const sel = state.config.selectedPlayerIds;
          if (sel.includes(pid)) state.config.selectedPlayerIds = sel.filter(x=>x!==pid);
          else state.config.selectedPlayerIds = [...sel, pid];
          save();
          // visual feedback
          name.style.color = sel.includes(pid) ? '' : '#4ade80';
        };
      }
    }
    setupDrag(row);
  });
}

function cycleConfig(field) {
  const c = state.config;
  const cycles = {
    punkte: [101,201,301,501,701],
    checkout: ['Straight Out','Double Out','Master Out'],
    checkin: ['Straight In','Double In','Master In'],
    saetze: [1,2,3,5,7],
    legs: [1,2,3,5,7],
    matchType: ['First to','Best of'],
  };
  const arr = cycles[field];
  const i = arr.indexOf(c[field]);
  c[field] = arr[(i+1) % arr.length];
  save(); render();
}

function promptAddPlayer(autoSelect) {
  const name = prompt('Name des Spielers:');
  if (!name || !name.trim()) return;
  const p = { id: uid(), name: name.trim(), isBot: false };
  state.players.push(p);
  if (autoSelect) state.config.selectedPlayerIds.push(p.id);
  save(); render();
}

function addBot() {
  state.botCounter = (state.botCounter || 0) + 1;
  const p = { id: uid(), name: 'DartBot ' + state.botCounter, isBot: true };
  state.players.push(p);
  state.config.selectedPlayerIds.push(p.id);
  save(); render();
}

// Drag & drop reorder
let dragSrcId = null;
function setupDrag(row) {
  row.addEventListener('dragstart', e => {
    dragSrcId = row.dataset.pid;
    row.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  row.addEventListener('dragend', () => row.classList.remove('dragging'));
  row.addEventListener('dragover', e => { e.preventDefault(); });
  row.addEventListener('drop', e => {
    e.preventDefault();
    const tgtId = row.dataset.pid;
    if (!dragSrcId || dragSrcId === tgtId) return;
    const list = state.view === 'home' ? state.config.selectedPlayerIds : state.players.map(p=>p.id);
    const from = list.indexOf(dragSrcId);
    const to = list.indexOf(tgtId);
    if (from<0||to<0) return;
    const moved = list.splice(from,1)[0];
    list.splice(to,0,moved);
    if (state.view === 'home') state.config.selectedPlayerIds = list;
    else state.players = list.map(id => state.players.find(p=>p.id===id));
    save(); render();
  });
}

function exportData() {
  const blob = new Blob([JSON.stringify({players:state.players,games:state.games,config:state.config},null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'dartrechner_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'application/json';
  inp.onchange = () => {
    const f = inp.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const data = JSON.parse(r.result);
        if (data.players) state.players = data.players;
        if (data.games) state.games = data.games;
        if (data.config) state.config = { ...state.config, ...data.config };
        save(); render();
        alert('Import erfolgreich');
      } catch (e) { alert('Fehler beim Import: '+e.message); }
    };
    r.readAsText(f);
  };
  inp.click();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Initial render
render();

// PWA: register service worker + auto-update
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    // Check for updates every time app opens
    reg.update();
    reg.addEventListener('updatefound', () => {
      const nw = reg.installing;
      if (!nw) return;
      nw.addEventListener('statechange', () => {
        if (nw.state === 'installed' && navigator.serviceWorker.controller) {
          // New version available - reload to apply
          window.location.reload();
        }
      });
    });
  }).catch(()=>{});
  // Reload when new SW takes control
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshing) return;
    refreshing = true;
    window.location.reload();
  });
}
</script>
